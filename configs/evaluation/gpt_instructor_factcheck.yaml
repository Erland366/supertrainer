# @package _global_

defaults:
  - /trainer/common/model_kwargs@evaluation.model_kwargs: sdpa
  - /dataset: llm/fact_checking

dataset:
  class_name: supertrainer.data.fact_checking.FactCheckingGPTEvaluationDataset
  dataset_kwargs:
    path: "assets_local/subset_dataset"

evaluation:
  system_prompt: "You are an helpful AI assistant. You can only response with either REFUTES, NOT_ENOUGH_INFO, or SUPPORTS for the claim given the evidence. You are asked to provide a fact-checking response to the following claim:"

  class_name: supertrainer.evaluations.gpt.GPTEvaluation
  classes:
    - REFUTES
    - SUPPORTS
    - NOT_ENOUGH_INFO

  batch_name: "gpt_factcheck"
  batch_dataset: "assets_local/subset_dataset"
  batch_kwargs:
    endpoint: "/v1/chat/completions"
    completion_window: 24h
    metadata:
      description: "GPT fact-checking"

  client_kwargs:
    model: "gpt-4o-mini"
    max_tokens: 64
    temperature: 0.2
    top_p: 1
